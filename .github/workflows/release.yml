name: Release

on:
  workflow_dispatch:
    inputs:
      prebuilt_release:
        description: "Release tag to download dist.zip from (e.g. 2026-01-01). Use 'latest' for the latest release. Leave empty to build all from source."
        required: false
        type: string

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Download prebuilt dist zip
        if: inputs.prebuilt_release != ''
        run: |
          if [ "$PREBUILT_RELEASE" = "latest" ]; then
            gh release download --pattern "dist.zip" --output prebuilt-dist.zip
          else
            gh release download "$PREBUILT_RELEASE" --pattern "dist.zip" --output prebuilt-dist.zip
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREBUILT_RELEASE: ${{ inputs.prebuilt_release }}

      - name: Build all
        run: |
          pnpm install
          pnpm build:all ${{ inputs.prebuilt_release != '' && '--prebuilt-dist-zip prebuilt-dist.zip' || '' }}

      - name: Create distributions
        run: zip -r dist.zip ./dist

      - name: Setup variables
        id: release_notes
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          VERSIONS=$(jq -r '.versions[] | "- " + .version' versions.json)
          {
            echo "body<<EOF"
            echo "$VERSIONS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.release_notes.outputs.date }}" \
            --title "Release (${{ steps.release_notes.outputs.date }})" \
            --notes "${{ steps.release_notes.outputs.body }}" \
            dist.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
